_format_version: "3.0"
_transform: true

services:
  - name: treepruning-backend
    url: http://backend:8080
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: api-v1
        paths:
          - /api/v1
        strip_path: false
        preserve_host: false
        protocols:
          - http
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:5173
            - http://localhost:4173
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
            - HEAD
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Authorization
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
          preflight_continue: false
