version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: treepruning-db
    environment:
      POSTGRES_DB: treepruning
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - treepruning-net

  backend:
    build:
      context: ./backend
    container_name: treepruning-backend
    ports:
      - "8080:8080"
    environment:
      POSTGRES_BD: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SERVER_PORT: 8080
      JPA_SHOW_SQL: "true"
      JPA_FORMAT_SQL: "true"
      JPA_DDL_AUTO: update
      JPA_SCHEMA: treepruning
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - treepruning-net

networks:
  treepruning-net:
    driver: bridge

volumes:
  postgres_data:
